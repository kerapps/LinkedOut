name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          zip -r linkedout.zip \
            manifest.json \
            background.js \
            config.js \
            translator.js \
            content.js \
            content.css \
            popup.html \
            popup.js \
            popup.css \
            icons/icon16.png \
            icons/icon48.png \
            icons/icon128.png

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing release if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            linkedout.zip \
            --title "LinkedOut ${{ steps.version.outputs.version }}" \
            --notes "Install: download \`linkedout.zip\`, unzip, then load unpacked in \`chrome://extensions/\` with Developer mode enabled." \
            --latest
